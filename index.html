<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Складская аналитика | Платформа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2ff;
        }

        .menu-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(66, 153, 225, 0.2);
            text-align: center;
            width: 90%;
            max-width: 550px;
            transition: transform 0.2s ease;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #c084fc, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .sub {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 2.5rem;
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
            text-align: left;
        }

        .btn-start {
            background: linear-gradient(95deg, #1e293b, #0f172a);
            border: 1px solid #3b82f6;
            padding: 1rem 2.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            border-radius: 2.5rem;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-start:hover {
            background: linear-gradient(95deg, #2d3a5e, #1e293b);
            border-color: #60a5fa;
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(59,130,246,0.2);
        }

        .feature-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .feature-grid span {
            background: #11182780;
            padding: 0.25rem 0.9rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 500px) {
            .menu-card { padding: 1.8rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="menu-card">
    <h1>📦 SORT·AI</h1>
    <div class="sub">
        Аналитика складских процессов<br>
        OCR + графы + рекомендации в реальном времени
    </div>
    <button class="btn-start" id="enterBtn">🚀 Перейти в аналитику →</button>
    <div class="feature-grid">
        <span>📸 ГРУППЫ (GR1–GR11)</span>
        <span>⏱️ Полибоксы >4ч</span>
        <span>📈 Сортировка/час</span>
        <span>⚙️ КС / предсорт</span>
        <span>🔊 Звук перегрузки</span>
    </div>
</div>
<script>
    document.getElementById('enterBtn').addEventListener('click', () => {
        window.location.href = 'analytics.html';
    });
</script>
</body>
</html>
